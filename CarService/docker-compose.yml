version: '3.7'


services:
  db:
    image: postgres:13-alpine
    restart: always
    container_name: db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - '5432:5432'

volumes:
    postgres_data:
